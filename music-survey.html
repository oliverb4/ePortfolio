<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Survey</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    margin: 20px;
}

h1 {
    text-align: center;
}

form {
    background-color: #ffffff;
    padding: 20px;
    border-radius: 10px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

label {
    display: block;
    margin-top: 10px;
}

input, textarea, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

fieldset {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
}

legend {
    font-weight: bold;
}

.buttons {
    margin-top: 15px;
    text-align: center;
}

footer {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>Music Survey</h1>

<form action="#" method="post">

    <!-- Name -->
    <label for="name">Name:</label>
    <input type="text" name="name" id="name">

    <!-- Email -->
    <label for="email">Email:</label>
    <input type="email" name="email" id="email">

    <!-- Comments (scrolling text box) -->
    <label for="comments">Tell us about your music preferences:</label>
    <textarea name="comments" id="comments" cols="60" rows="3"></textarea>

    <!-- Radio Buttons -->
    <fieldset>
        <legend>Favorite Music Genre</legend>
        <label><input type="radio" name="genre" value="pop"> Pop</label>
        <label><input type="radio" name="genre" value="hiphop"> Hip-Hop</label>
        <label><input type="radio" name="genre" value="rock"> Rock</label>
    </fieldset>

    <!-- Checkboxes -->
    <fieldset>
        <legend>How do you listen to music?</legend>
        <label><input type="checkbox" name="listen" value="spotify"> Spotify</label>
        <label><input type="checkbox" name="listen" value="radio"> Radio</label>
        <label><input type="checkbox" name="listen" value="youtube"> YouTube</label>
    </fieldset>

    <!-- Select Box -->
    <label for="artists">Favorite Artist:</label>
    <select name="artists" id="artists" size="3">
        <option>Taylor Swift</option>
        <option>Drake</option>
        <option>Beyoncé</option>
        <option>The Weeknd</option>
    </select>

    <!-- Buttons -->
    <div class="buttons">
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </div>

</form>

<footer>
    <p>Brenton Oliver | A02474376@alabama.edu</p>
</footer>

</body>
</html>
